<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Inscrição</title>
</head>
<body>
    <h1>Formulário de Inscrição</h1>

    <form action="#" method="post">
        
        <div>
            <label for="nome">Nome:</label><br>
            <input type="text" name="nome" id="nome" required>
            <br><br>
        </div>
        <div>
            <label for="email">Email:</label><br>
            <input type="email" name="email" id="email" required>
            <br><br>
        </div>
        <div>
            <label for="fone">Whatsapp:</label><br>
            <input type="tel" name="fone" id="fone" required>
            <br><br>
        </div>
        <div>
            <label>Área de Atuação:</label><br>

            <input type="radio" name="area" id="dev" value="dev" required>
            <label for="dev">Desenvolvimento</label>

            <input type="radio" name="area" id="qa" value="qa" required>
            <label for="qa">Quality Assurance (QA)</label>

            <input type="radio" name="area" id="dados" value="dados" required>
            <label for="dados">Análise De Dados</label>

            <input type="radio" name="area" id="infra" value="infra" required>
            <label for="infra">Infraestrutura</label>
            <br><br>

        </div>
        <div>
            <label for="observacoes">Observações:</label><br>
            <textarea name="observacoes" id="observacoes" cols="40" rows="4"></textarea>
            <br><br>
        </div>
        <div>
            <input type="checkbox" name="receberOfertas" id="receberOfertas">
            <label for="receberOfertas">Desejo receber novidades e ofertas por email.</label>
            <br><br>
        </div>
        <div>
            <button type="submit">Enviar</button>
        </div>
    
    </form>
</body>
</html>
