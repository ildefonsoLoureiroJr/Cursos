<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inputs do HTML</title>
</head>
<body>
    <h1>Inputs no HTML</h1>
    <form>
        <!--Compo de Texto-->
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" required>

        <br><br>
        <!--Campo de Email-->
        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" required>

        <br><br>
        <!--Campo de Senha-->
        <label for="senha">Senha:</label>
        <input type="password" id="senha" name="senha">

        <br><br>
        <!--Campo de seleção de radio-->
        <label>Gênero:</label><br>
        <input type="radio" id="masculino" name="genero" value="m">
        <label for="masculino">Masculino</label>
        <input type="radio" id="feminino" name="genero" value="f">
        <label for="feminino">Feminino</label>
        <br><br>

        <!--Campo de seleção multipla (Checkbox) -->
        <label>Interesses:</label>
        <input type="checkbox" id="backend" value="backend" name="interesses">
        <label for="backend">Back-end</label>
        <input type="checkbox" id="frontend" value="frontend" name="interesses">
        <label for="frontend">Front-end</label>
        <input type="checkbox" id="fullstack" value="fullstack" name="interesses">
        <label for="fullstack">Full-Stack</label>
        <br><br>

        <!--Campo de Data -->
        <label for="dataDeNascimento">Data de Nascimento:</label>
        <input type="date" name="nascimento" id="dataDeNascimento">

        <br><br>

        <!--Campo de Arquivos (uploads) -->
        <label for="fotoDePerfil">Foto de Perfil:</label>
        <input type="file" name="avatar" id="fotoDePerfil">

        <br><br>

        <!--Campo de Caixa de Opções -->
        <label for="situacao">Situação Atual:</label>
        <select name="situacao" id="situacao">
            <option value="" selected disabled>Selecione uma das Opções...</option>
            <option value="estudante">Estudando para me tornar Programador</option>
            <option value="estagiario">Atuando como estagiário/trainee</option>
            <option value="junior">Atuando como desenvolvedor júnior</option>
            <option value="pleno">Atuando como desenvolvedor pleno</option>
            <option value="senior">Atuando como desenvolvedor sênior</option>
        </select>

        <br><br>
        <!--Campo de área de texte de multiplas linhas -->

        <label for="sobre">Sobre mim:</label><br>
        <textarea name="sobre" id="sobre" cols="40" rows="6" placeholder="Fale um pouco sobre você!"></textarea>

        <br><br>


        <button type="submit">Enviar</button>
    </form>
</body>
</html>
